name: 📱 iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version override (e.g. 1.1.0)"
        required: false
        type: string

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: 🏗️ Build & Upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/ios

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔧 Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: 📦 Install XcodeGen
        run: brew install xcodegen

      - name: 🛠️ Generate Xcode project
        run: xcodegen generate

      - name: 🔑 Install signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: 📋 Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Decode profile plist for extraction
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: 📐 Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="1.0.0"
          fi
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

          echo "### 📱 Build Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $VERSION ($BUILD_NUMBER)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"

          echo "::notice::📱 Building version $VERSION ($BUILD_NUMBER)"

      - name: 🔨 Build archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ChapterCheck.xcodeproj \
            -scheme ChapterCheck \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ChapterCheck.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            MARKETING_VERSION="$VERSION" \
            | xcpretty

      - name: 📦 Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail

          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.chaptercheck.app</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ChapterCheck.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            | xcpretty

      - name: 🚀 Upload to TestFlight
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Write API key
          mkdir -p ~/.private_keys
          echo "$APPSTORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8

          # Verify IPA exists
          IPA_PATH="$RUNNER_TEMP/export/ChapterCheck.ipa"
          if [ ! -f "$IPA_PATH" ]; then
            echo "Error: IPA not found at $IPA_PATH"
            ls -la "$RUNNER_TEMP/export/" || true
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"

          echo "### ✅ Upload Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Uploaded:** ChapterCheck $VERSION ($BUILD_NUMBER) to TestFlight" >> "$GITHUB_STEP_SUMMARY"

      - name: 📝 Generate release notes
        working-directory: .
        run: |
          # Find the last ios-build tag
          LAST_TAG=$(git tag --list 'ios-build/*' --sort=-version:refname | head -n1)

          if [ -n "$LAST_TAG" ]; then
            echo "Generating notes since tag: $LAST_TAG"
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --no-merges -- apps/ios/)
          else
            echo "No previous ios-build tag found, using last 20 commits"
            COMMITS=$(git log --oneline --no-merges -20 -- apps/ios/)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="(no app-specific changes)"
          fi

          # Format as bulleted list
          NOTES="v${VERSION} (${BUILD_NUMBER})

          $(echo "$COMMITS" | sed 's/^[a-f0-9]* /• /')"

          # Write to env (multiline)
          {
            echo "WHAT_TO_TEST<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_ENV"

          echo "### 📝 What to Test" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$NOTES" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: 🧪 Set TestFlight "What to Test" notes
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_APP_ID: ${{ vars.APPSTORE_APP_ID }}
        run: |
          python3 -m venv "$RUNNER_TEMP/venv"
          source "$RUNNER_TEMP/venv/bin/activate"
          pip install --quiet PyJWT cryptography

          python3 << 'PYEOF'
          import os, sys, time, jwt, requests

          # Read ASC API credentials
          key_id = os.environ["APPSTORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APPSTORE_CONNECT_ISSUER_ID"]
          app_id = os.environ.get("APPSTORE_APP_ID")
          if not app_id:
              print("Error: APPSTORE_APP_ID variable is not set. Add it in Settings → Variables → Actions.")
              sys.exit(1)
          build_number = os.environ["BUILD_NUMBER"]
          version = os.environ["VERSION"]
          what_to_test = os.environ["WHAT_TO_TEST"][:4000]

          key_path = os.path.expanduser(f"~/.private_keys/AuthKey_{key_id}.p8")
          with open(key_path, "r") as f:
              private_key = f.read()

          def make_token():
              now = int(time.time())
              payload = {
                  "iss": issuer_id,
                  "iat": now,
                  "exp": now + 1200,  # 20 min
                  "aud": "appstoreconnect-v1",
              }
              return jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": key_id})

          BASE = "https://api.appstoreconnect.apple.com/v1"

          def headers():
              return {"Authorization": f"Bearer {make_token()}", "Content-Type": "application/json"}

          # Poll for build to finish processing (up to 15 min)
          print(f"Waiting for build {version} ({build_number}) to process...")
          build_id = None
          for attempt in range(30):
              resp = requests.get(
                  f"{BASE}/builds",
                  headers=headers(),
                  params={
                      "filter[app]": app_id,
                      "filter[version]": build_number,
                      "filter[preReleaseVersion.version]": version,
                      "fields[builds]": "processingState,version",
                  },
                  timeout=30,
              )
              resp.raise_for_status()
              data = resp.json().get("data", [])

              if data:
                  state = data[0]["attributes"]["processingState"]
                  build_id = data[0]["id"]
                  print(f"  Attempt {attempt+1}: {state}")
                  if state == "VALID":
                      break
                  if state == "FAILED":
                      print("Build processing failed!")
                      sys.exit(1)

              if attempt < 29:
                  time.sleep(30)
          else:
              print("Timed out waiting for build processing")
              sys.exit(1)

          if build_id is None:
              print("Error: Build not found in App Store Connect")
              sys.exit(1)

          print(f"Build processed: {build_id}")

          # Check for existing localization
          resp = requests.get(
              f"{BASE}/builds/{build_id}/betaBuildLocalizations",
              headers=headers(),
              timeout=30,
          )
          resp.raise_for_status()
          localizations = resp.json().get("data", [])

          en_loc = None
          for loc in localizations:
              if loc["attributes"].get("locale") == "en-US":
                  en_loc = loc
                  break

          payload = {
              "data": {
                  "type": "betaBuildLocalizations",
                  "attributes": {
                      "whatsNew": what_to_test,
                      "locale": "en-US",
                  },
              }
          }

          if en_loc:
              # Update existing
              loc_id = en_loc["id"]
              payload["data"]["id"] = loc_id
              resp = requests.patch(f"{BASE}/betaBuildLocalizations/{loc_id}", headers=headers(), json=payload, timeout=30)
          else:
              # Create new
              payload["data"]["relationships"] = {
                  "build": {"data": {"type": "builds", "id": build_id}}
              }
              resp = requests.post(f"{BASE}/betaBuildLocalizations", headers=headers(), json=payload, timeout=30)

          resp.raise_for_status()
          print("What to Test notes set successfully!")
          PYEOF

      - name: 🏷️ Tag build
        working-directory: .
        run: |
          git tag "ios-build/${BUILD_NUMBER}"
          git push origin "ios-build/${BUILD_NUMBER}"

      - name: 🧹 Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
