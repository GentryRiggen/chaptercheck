name: 📱 iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version override (e.g. 1.1.0)"
        required: false
        type: string

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: 🏗️ Build & Upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/ios

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: 📦 Install XcodeGen
        run: brew install xcodegen

      - name: 🛠️ Generate Xcode project
        run: xcodegen generate

      - name: 🔑 Install signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: 📋 Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Decode profile plist for extraction
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: 📐 Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="1.0.0"
          fi
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

          echo "### 📱 Build Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $VERSION ($BUILD_NUMBER)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"

          echo "::notice::📱 Building version $VERSION ($BUILD_NUMBER)"

      - name: 🔨 Build archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ChapterCheck.xcodeproj \
            -scheme ChapterCheck \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ChapterCheck.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            MARKETING_VERSION="$VERSION" \
            | xcpretty

      - name: 📦 Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail

          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.chaptercheck.app</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ChapterCheck.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            | xcpretty

      - name: 🚀 Upload to TestFlight
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Write API key
          mkdir -p ~/.private_keys
          echo "$APPSTORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8

          # Verify IPA exists
          IPA_PATH="$RUNNER_TEMP/export/ChapterCheck.ipa"
          if [ ! -f "$IPA_PATH" ]; then
            echo "Error: IPA not found at $IPA_PATH"
            ls -la "$RUNNER_TEMP/export/" || true
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"

          echo "### ✅ Upload Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Uploaded:** ChapterCheck $VERSION ($BUILD_NUMBER) to TestFlight" >> "$GITHUB_STEP_SUMMARY"

      - name: 🧹 Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
